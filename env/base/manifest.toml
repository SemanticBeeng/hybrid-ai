version = 1

[install]
bash.pkg-path = "bash"
coreutils.pkg-path = "coreutils"
git.pkg-path = "git"
findutils.pkg-path = "findutils"
gnused.pkg-path = "gnused"
ripgrep.pkg-path = "ripgrep"
jq.pkg-path = "jq"
yq.pkg-path = "yq"
just.pkg-path = "just"
curl.pkg-path = "curl"

[vars]
NIX_ISOLATED_ROOT = "/opt/bin/dev/nix"
NIX_MOUNT_POINT = "/nix"
NIX_CONF_DIR = "/etc/nix"
NIX_REMOTE = "daemon"
FLOX_DISABLE_METRICS = "true"

[hook]
on-activate = '''
source scripts/env/toolchain/xdg_env.sh
'''
