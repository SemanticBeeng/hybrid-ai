version = 1

[install]
libgcc.pkg-path = "libgcc"
libgcc.systems = ["x86_64-linux"]

[include]
environments = [
	{ dir = "../base" },
	{ dir = "../python" },
	{ dir = "../swift" },
	{ dir = "../inference" },
]

[hook]
on-activate = '''
PROJECT_ROOT="$(cd "$FLOX_ENV_PROJECT/../.." && pwd)"
source "$PROJECT_ROOT/scripts/env/toolchain/common.sh"
source "$PROJECT_ROOT/scripts/env/toolchain/python_env.sh"
export HYBRID_AI_PROFILE=${HYBRID_AI_PROFILE:-fullstack}
hybrid_ai_setup_python_env
'''

[profile]
bash = '''
PROJECT_ROOT="$(cd "$FLOX_ENV_PROJECT/../.." && pwd)"
source "$PROJECT_ROOT/scripts/env/toolchain/python_env.sh"
hybrid_ai_activate_python_env
'''

zsh = '''
PROJECT_ROOT="$(cd "$FLOX_ENV_PROJECT/../.." && pwd)"
source "$PROJECT_ROOT/scripts/env/toolchain/python_env.sh"
hybrid_ai_activate_python_env
'''
