version = 1

[install]
python.pkg-path = "python311"
python.systems = ["x86_64-linux"]
poetry.pkg-path = "poetry"
poetry.systems = ["x86_64-linux"]
uv.pkg-path = "uv"
uv.systems = ["x86_64-linux"]
libgcc.pkg-path = "libgcc"
libgcc.systems = ["x86_64-linux"]

[include]
environments = [
	{ dir = "../base" },
]

[vars]
PYTHONDONTWRITEBYTECODE = "1"
PIP_DISABLE_PIP_VERSION_CHECK = "1"
POETRY_VIRTUALENVS_CREATE = "false"

[hook]
on-activate = '''
source scripts/env/toolchain/inference_srv_py/inference_srv_py_env.sh
inference_srv_py_setup_env
'''

[profile]
common = '''
source scripts/env/toolchain/inference_srv_py/inference_srv_py_env.sh
inference_srv_py_activate_env
'''
