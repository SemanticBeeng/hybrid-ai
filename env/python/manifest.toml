version = 1

[install]
python.pkg-path = "python311"
python.systems = ["x86_64-linux"]
poetry.pkg-path = "poetry"
poetry.systems = ["x86_64-linux"]
uv.pkg-path = "uv"
uv.systems = ["x86_64-linux"]
libgcc.pkg-path = "libgcc"
libgcc.systems = ["x86_64-linux"]
vulkan-loader.pkg-path = "vulkan-loader"
vulkan-loader.systems = ["x86_64-linux"]
vulkan-tools.pkg-path = "vulkan-tools"
vulkan-tools.systems = ["x86_64-linux"]
xorg-libx11.pkg-path = "xorg.libX11"
xorg-libx11.systems = ["x86_64-linux"]
xorg-libxext.pkg-path = "xorg.libXext"
xorg-libxext.systems = ["x86_64-linux"]
xorg-libxcb.pkg-path = "xorg.libxcb"
xorg-libxcb.systems = ["x86_64-linux"]
xorg-libxau.pkg-path = "xorg.libXau"
xorg-libxau.systems = ["x86_64-linux"]
xorg-libxdmcp.pkg-path = "xorg.libXdmcp"
xorg-libxdmcp.systems = ["x86_64-linux"]

[include]
environments = [
	{ dir = "../base" },
]

[vars]
PYTHONDONTWRITEBYTECODE = "1"
PIP_DISABLE_PIP_VERSION_CHECK = "1"
POETRY_VIRTUALENVS_CREATE = "false"

[hook]
on-activate = '''
source scripts/env/toolchain/python/python_env.sh
hybrid_ai_setup_python_env
'''

[profile]
common = '''
source scripts/env/toolchain/python/python_env.sh
hybrid_ai_activate_python_env
'''
